name: Build ArtVault Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: ArtVault v__VERSION__
          releaseBody: |
            ## ArtVault — Local AI Gallery

            ### Install
            - Download **ArtVault_1.0.0_x64_en-US.msi** and run it
            - Or download **artvault.exe** for a portable version (no install needed)
          releaseDraft: false
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ArtVault-Windows-Installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/artvault.exe
          retention-days: 30
          if-no-files-found: warn
